<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Timetable - Widget</title>
    <!-- Google Fonts: Outfit และ Kanit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #475569;
            --border-color: rgba(203, 213, 225, 0.5);
            --primary: #4f46e5;
            
            /* สีประจำวัน */
            --color-mon: #d97706; 
            --color-tue: #db2777; 
            --color-wed: #059669; 
            --color-thu: #ea580c; 
            --color-fri: #0891b2; 
            --color-sat: #7c3aed; 
            --color-sun: #dc2626; 

            /* สีการ์ดวิชาเรียน */
            --subject-indigo: rgba(238, 242, 255, 0.9);
            --subject-indigo-dark: #1e1b4b; 
            --subject-indigo-border: #4f46e5;

            --subject-emerald: rgba(236, 253, 245, 0.9);
            --subject-emerald-dark: #022c22; 
            --subject-emerald-border: #059669;

            --subject-coral: rgba(255, 247, 237, 0.9);
            --subject-coral-dark: #431407; 
            --subject-coral-border: #ea580c;

            --subject-amethyst: rgba(250, 245, 255, 0.9);
            --subject-amethyst-dark: #2e1065; 
            --subject-amethyst-border: #9333ea;

            --subject-amber: rgba(255, 251, 235, 0.9);
            --subject-amber-dark: #451a03; 
            --subject-amber-border: #d97706;

            --border-radius-md: 8px;
            --border-radius-sm: 4px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Kanit', sans-serif;
            background: transparent;
            color: var(--text-main);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        /* Background Aurora */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            overflow: hidden;
        }

        .aurora-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            z-index: -1;
        }

        .blob-1 { background-color: #c7d2fe; top: -50px; left: -50px; }
        .blob-2 { background-color: #fbcfe8; bottom: -50px; right: -50px; }

        /* Widget Container */
        .widget-container {
            width: 100%;
            height: 100vh;
            max-height: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 10px;
            box-shadow: 0 8px 32px rgba(15, 23, 42, 0.04);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Widget Header */
        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .widget-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .schedule-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.8);
            padding: 2px 6px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        /* Timetable Grid Container */
        .timetable-wrapper {
            flex-grow: 1;
            width: 100%;
            overflow: auto;
            border-radius: var(--border-radius-md);
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.5);
            position: relative;
        }

        .timetable-grid {
            display: grid;
            position: relative;
            grid-template-columns: 50px repeat(24, minmax(32px, 1fr));
            grid-template-rows: 28px repeat(7, minmax(48px, auto));
            min-width: 820px;
            height: 100%;
        }

        .grid-header-cell {
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid var(--border-color);
            border-right: 1.5px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 6px;
            font-weight: 700;
            font-size: 0.72rem;
            position: sticky;
            left: 0;
            z-index: 5;
        }

        .time-label-header {
            grid-row: 1;
            grid-column: 1;
            background-color: #f8fafc;
            border-bottom: 1.5px solid var(--border-color);
            border-right: 1.5px solid var(--border-color);
            font-size: 0.65rem;
            color: var(--text-muted);
            justify-content: center;
            padding-left: 0;
            position: sticky;
            top: 0;
            left: 0;
            z-index: 6;
        }

        /* Day Colors on Header */
        .day-header-mon { grid-row: 2; grid-column: 1; border-left: 3.5px solid var(--color-mon); color: var(--color-mon) !important; }
        .day-header-tue { grid-row: 3; grid-column: 1; border-left: 3.5px solid var(--color-tue); color: var(--color-tue) !important; }
        .day-header-wed { grid-row: 4; grid-column: 1; border-left: 3.5px solid var(--color-wed); color: var(--color-wed) !important; }
        .day-header-thu { grid-row: 5; grid-column: 1; border-left: 3.5px solid var(--color-thu); color: var(--color-thu) !important; }
        .day-header-fri { grid-row: 6; grid-column: 1; border-left: 3.5px solid var(--color-fri); color: var(--color-fri) !important; }
        .day-header-sat { grid-row: 7; grid-column: 1; border-left: 3.5px solid var(--color-sat); color: var(--color-sat) !important; }
        .day-header-sun { grid-row: 8; grid-column: 1; border-left: 3.5px solid var(--color-sun); color: var(--color-sun) !important; }

        /* Time axis top cells */
        .time-axis-cell {
            grid-row: 1;
            background-color: #f8fafc;
            border-bottom: 1.5px solid var(--border-color);
            border-right: 1px dashed rgba(226, 232, 240, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
            position: sticky;
            top: 0;
            z-index: 4;
        }

        .grid-cell {
            border-right: 1px dashed rgba(241, 245, 249, 0.7);
            border-bottom: 1px solid rgba(226, 232, 240, 0.5);
        }

        .grid-cell.hour-line {
            border-right: 1px solid var(--border-color);
        }

        /* Subject mini cards */
        .subject-card {
            border-radius: var(--border-radius-sm);
            padding: 4px;
            position: relative;
            border: 1px solid transparent;
            box-shadow: 0 2px 6px rgba(15, 23, 42, 0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            margin: 1px;
            overflow: hidden;
            z-index: 2;
        }

        .card-indigo { background: var(--subject-indigo); color: var(--subject-indigo-dark); border-color: var(--subject-indigo-border); }
        .card-emerald { background: var(--subject-emerald); color: var(--subject-emerald-dark); border-color: var(--subject-emerald-border); }
        .card-coral { background: var(--subject-coral); color: var(--subject-coral-dark); border-color: var(--subject-coral-border); }
        .card-amethyst { background: var(--subject-amethyst); color: var(--subject-amethyst-dark); border-color: var(--subject-amethyst-border); }
        .card-amber { background: var(--subject-amber); color: var(--subject-amber-dark); border-color: var(--subject-amber-border); }

        .card-code {
            font-size: 0.58rem;
            font-weight: 700;
            opacity: 0.95;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-name {
            font-size: 0.58rem;
            font-weight: 600;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 1px 0;
        }

        .card-meta {
            font-size: 0.52rem;
            opacity: 0.9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Empty State */
        .grid-empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 500;
            text-align: center;
            gap: 4px;
        }

        /* Hide Scrollbar for Web Widget container */
        .timetable-wrapper::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .timetable-wrapper::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 0.8);
            border-radius: 10px;
        }
        .timetable-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="aurora-bg">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
    </div>

    <div class="widget-container">
        <div class="widget-header">
            <div class="widget-title">🕒 ตารางเรียนสัปดาห์นี้</div>
            <div class="schedule-name" id="schedule-name">ตารางเรียน</div>
        </div>

        <div class="timetable-wrapper">
            <div class="timetable-grid" id="timetable-grid">
                <div class="grid-header-cell time-label-header">เวลา/วัน</div>
                <div class="grid-header-cell day-header-mon">จันทร์</div>
                <div class="grid-header-cell day-header-tue">อังคาร</div>
                <div class="grid-header-cell day-header-wed">พุธ</div>
                <div class="grid-header-cell day-header-thu">พฤหัสฯ</div>
                <div class="grid-header-cell day-header-fri">ศุกร์</div>
                <div class="grid-header-cell day-header-sat">เสาร์</div>
                <div class="grid-header-cell day-header-sun">อาทิตย์</div>
            </div>
        </div>
    </div>

    <script>
        const START_HOUR = 8;
        const END_HOUR = 20;
        const TOTAL_ROWS = (END_HOUR - START_HOUR) * 2;

        const dayColumnIndices = {
            'Monday': 2, 'Tuesday': 3, 'Wednesday': 4, 'Thursday': 5, 'Friday': 6, 'Saturday': 7, 'Sunday': 8
        };
        const columnIndexToDay = {
            2: 'Monday', 3: 'Tuesday', 4: 'Wednesday', 5: 'Thursday', 6: 'Friday', 7: 'Saturday', 8: 'Sunday'
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderWidget();
            // Listen for changes in localStorage from other tabs
            window.addEventListener('storage', (e) => {
                if (e.key === 'my_schedules_list' || e.key === 'my_active_schedule_id') {
                    renderWidget();
                }
            });
        });

        function getActiveSchedule() {
            const listData = localStorage.getItem('my_schedules_list');
            const activeId = localStorage.getItem('my_active_schedule_id');
            if (listData) {
                try {
                    const schedules = JSON.parse(listData);
                    return schedules.find(s => s.id === activeId) || schedules[0];
                } catch (e) {
                    console.error(e);
                }
            }
            return null;
        }

        function timeToGridCol(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            const clampedH = Math.max(START_HOUR, Math.min(END_HOUR, h));
            const minutesSinceStart = (clampedH - START_HOUR) * 60 + m;
            return Math.round(minutesSinceStart / 30) + 2;
        }

        function renderWidget() {
            const grid = document.getElementById('timetable-grid');
            if (!grid) return;

            // Remove existing generated elements
            const elementsToRemove = grid.querySelectorAll('.time-axis-cell, .grid-cell, .subject-card, .grid-empty-state');
            elementsToRemove.forEach(el => el.remove());

            // 1. Create time axis cells (08:00 - 19:00)
            for (let hour = START_HOUR; hour < END_HOUR; hour++) {
                const timeCell = document.createElement('div');
                timeCell.className = 'time-axis-cell';
                const startCol = (hour - START_HOUR) * 2 + 2;
                timeCell.style.gridColumn = `${startCol} / ${startCol + 2}`;
                timeCell.style.gridRow = '1';
                timeCell.innerText = `${String(hour).padStart(2, '0')}:00`;
                grid.appendChild(timeCell);
            }

            // 2. Create grid background cells
            for (let dayRow = 2; dayRow <= 8; dayRow++) {
                const dayName = columnIndexToDay[dayRow];
                for (let slot = 0; slot < TOTAL_ROWS; slot++) {
                    const colNum = slot + 2;
                    const isHourEnd = (slot % 2 === 1);
                    const cell = document.createElement('div');
                    cell.className = `grid-cell ${isHourEnd ? 'hour-line' : ''}`;
                    cell.style.gridRow = `${dayRow}`;
                    cell.style.gridColumn = `${colNum}`;
                    grid.appendChild(cell);
                }
            }

            const activeSch = getActiveSchedule();
            const label = document.getElementById('schedule-name');
            if (activeSch) {
                label.innerText = activeSch.name;
            } else {
                label.innerText = 'ไม่มีตารางเรียน';
            }

            const subjects = activeSch ? activeSch.subjects : [];

            if (subjects.length === 0) {
                const emptyState = document.createElement('div');
                emptyState.className = 'grid-empty-state';
                emptyState.style.gridColumn = '2 / 26';
                emptyState.style.gridRow = '2 / 9';
                emptyState.innerHTML = `
                    <div style="font-size: 1.2rem;">📅</div>
                    <div>ตารางเรียนว่างเปล่า</div>
                `;
                grid.appendChild(emptyState);
                return;
            }

            // 3. Render subjects
            subjects.forEach(sub => {
                const cardIndex = dayColumnIndices[sub.day];
                if (!cardIndex) return;

                const startVal = timeToGridCol(sub.startTime);
                let endVal = timeToGridCol(sub.endTime);
                if (endVal <= startVal) endVal = startVal + 1;

                const card = document.createElement('div');
                card.className = `subject-card card-${sub.color}`;
                card.style.gridRow = `${cardIndex}`;
                card.style.gridColumn = `${startVal} / ${endVal}`;

                card.innerHTML = `
                    <div class="card-code">${sub.subjectCode}</div>
                    <div class="card-name">${sub.subjectName}</div>
                    <div class="card-meta">📍 ${sub.room || 'ไม่ระบุ'}</div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
